name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['12.*', '13.*']
        stability: [prefer-lowest, prefer-stable]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Statamic's documented extensions pinned explicitly — survives
          # runner-image changes to the default extension set.
          extensions: bcmath, ctype, curl, dom, exif, gd, iconv, intl, libxml, mbstring, openssl, pdo, tokenizer, xml, zip
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      # Serial on purpose: never add --parallel (see EXECUTION-NOTES.md).
      - name: Run tests
        run: vendor/bin/pest --ci

  pint:
    runs-on: ubuntu-latest
    name: Pint (code style)

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/pint --test

  phpstan:
    runs-on: ubuntu-latest
    name: PHPStan (static analysis)

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  # v1.1: add a `passport` job here — a Passport-installed integration leg
  # covering the OAuth mode end to end (real Bearer 200s, token-lifecycle
  # 401s, WWW-Authenticate/RFC 9728 metadata, DCR, scope-enforcement
  # decision, Eloquent user normalization, wrong-driver 503, statelessness).
  # The full 9-item checklist lives in docs/superpowers/plans/EXECUTION-NOTES.md
  # under "Task 27/28 (Passport CI leg)".
